name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Clean Android Architecture
      run: |
        mkdir -p app/src/main/java/com/example/schoolapp
        mkdir -p app/src/main/res/values

        # 1. settings.gradle
        echo "include ':app'" > settings.gradle

        # 2. Root build.gradle
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # 3. app/build.gradle
        cat <<EOF > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace 'com.example.schoolapp'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.schoolapp"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        # 4. AndroidManifest.xml
        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="School App" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 5. strings.xml
        echo '<resources><string name="app_name">School App</string></resources>' > app/src/main/res/values/strings.xml

        # 6. MainActivity.java
        cat <<EOF > app/src/main/java/com/example/schoolapp/MainActivity.java
        package com.example.schoolapp;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(new android.view.View(this));
            }
        }
        EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Build APK with Safe Gradle
      run: gradle app:assembleDebug

    # මේ පියවරෙන් මුළු සර්වර් එකේම තියෙන ඕනෑම debug APK එකක් ඉබේම සොයාගනී
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: School-App-APK
        path: "**/outputs/apk/debug/*.apk"
