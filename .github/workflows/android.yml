name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Unzip Project
      run: |
        if [ -f "School-app.zip" ]; then
          unzip School-app.zip
        else
          echo "🚨 School-app.zip not found in repository!"
          exit 1
        fi

    - name: Generate Debug Keystore
      run: |
        if [ ! -f "app/debug.keystore" ]; then
          mkdir -p app
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Setup Gradle
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          echo "Gradlew not found, trying to run standard gradle build"
        fi

    - name: Build with Gradle
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: android-app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
